server:
  port: 0

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/event}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  resilience4j:
    circuitbreaker:
      instances:
        commentService:
          sliding-window-size: 10
          minimum-number-of-calls: 5
          failure-rate-threshold: 50
          wait-duration-in-open-state: 10s
          permitted-number-of-calls-in-half-open-state: 3
          ignoreExceptions:
            - ru.practicum.exception.NotFoundException
            - ru.practicum.exception.BadRequestException
            - ru.practicum.exception.ConflictException

        requestService:
          sliding-window-size: 10
          minimum-number-of-calls: 5
          failure-rate-threshold: 50
          wait-duration-in-open-state: 10s
          permitted-number-of-calls-in-half-open-state: 3
          ignoreExceptions:
            - ru.practicum.exception.NotFoundException
            - ru.practicum.exception.BadRequestException
            - ru.practicum.exception.ConflictException

        userService:
          sliding-window-size: 10
          minimum-number-of-calls: 5
          failure-rate-threshold: 50
          wait-duration-in-open-state: 10s
          permitted-number-of-calls-in-half-open-state: 3
          ignoreExceptions:
            - ru.practicum.exception.NotFoundException
            - ru.practicum.exception.BadRequestException
            - ru.practicum.exception.ConflictException

stats:
  service-id: stats-server

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.hibernate.type.descriptor.sql: WARN
    org.springframework.orm.jpa: ERROR
    org.springframework.transaction: ERROR