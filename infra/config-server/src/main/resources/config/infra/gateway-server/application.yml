server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

      routes:
        - id: main-service-admin
          uri: lb://main-service
          predicates:
            - Path=/admin/**

        - id: main-service-users
          uri: lb://main-service
          predicates:
            - Path=/users/**

        - id: main-service-events
          uri: lb://main-service
          predicates:
            - Path=/events/**

        - id: main-service-categories
          uri: lb://main-service
          predicates:
            - Path=/categories/**

        - id: main-service-compilations
          uri: lb://main-service
          predicates:
            - Path=/compilations/**
