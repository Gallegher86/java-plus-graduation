services:

  discovery-server:
    build:
      context: infra/discovery-server
      dockerfile: DockerFile
    container_name: discovery-server
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10

  config-server:
    build:
      context: infra/config-server
      dockerfile: DockerFile
    container_name: config-server
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      - EUREKA_URI=http://discovery-server:8761/eureka/
    ports:
      - "8888:8888"
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10

  # ---------------- DB ----------------

  stats-db:
    image: postgres:16.1
    container_name: stats-db
    environment:
      POSTGRES_USER: stat
      POSTGRES_PASSWORD: stat
      POSTGRES_DB: stat
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U stat" ]
      interval: 5s
      timeout: 5s
      retries: 10

  ewm-db-user:
    image: postgres:16.1
    container_name: ewm-db-user
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user" ]
      interval: 5s
      timeout: 5s
      retries: 10

  ewm-db-event:
    image: postgres:16.1
    container_name: ewm-db-event
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: event
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user" ]
      interval: 5s
      timeout: 5s
      retries: 10

  ewm-db-request:
    image: postgres:16.1
    container_name: ewm-db-request
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: request
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user" ]
      interval: 5s
      timeout: 5s
      retries: 10

  ewm-db-comment:
    image: postgres:16.1
    container_name: ewm-db-comment
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: comment
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------- SERVICES ----------------

  stats-server:
    build:
      context: stats/stats-server
      dockerfile: DockerFile
    container_name: stats-server
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://stats-db:5432/stat
      - SPRING_DATASOURCE_USERNAME=stat
      - SPRING_DATASOURCE_PASSWORD=stat
      - EUREKA_URI=http://discovery-server:8761/eureka/
      - CONFIG_SERVER_URI=http://config-server:8888
    depends_on:
      stats-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  user-service:
    build:
      context: core/user-service
      dockerfile: DockerFile
    container_name: user-service
    depends_on:
      ewm-db-user:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ewm-db-user:5432/user
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_URI=http://discovery-server:8761/eureka/
      - CONFIG_SERVER_URI=http://config-server:8888
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  event-service:
    build:
      context: core/event-service
      dockerfile: DockerFile
    container_name: event-service
    depends_on:
      ewm-db-event:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ewm-db-event:5432/event
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_URI=http://discovery-server:8761/eureka/
      - STATS_SERVER_URL=http://stats-server
      - CONFIG_SERVER_URI=http://config-server:8888
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  request-service:
    build:
      context: core/request-service
      dockerfile: DockerFile
    container_name: request-service
    depends_on:
      ewm-db-request:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ewm-db-request:5432/request
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_URI=http://discovery-server:8761/eureka/
      - CONFIG_SERVER_URI=http://config-server:8888
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  comment-service:
    build:
      context: core/comment-service
      dockerfile: DockerFile
    container_name: comment-service
    depends_on:
      ewm-db-comment:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ewm-db-comment:5432/comment
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_URI=http://discovery-server:8761/eureka/
      - CONFIG_SERVER_URI=http://config-server:8888
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8084/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  gateway-server:
    build:
      context: infra/gateway-server
      dockerfile: DockerFile
    container_name: gateway-server
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_healthy
      event-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      request-service:
        condition: service_healthy
      stats-server:
        condition: service_healthy
    environment:
      - EUREKA_URI=http://discovery-server:8761/eureka/
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
